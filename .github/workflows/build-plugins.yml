name: Build Plugin Zips

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java/Groovy
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Install Groovy
        run: |
          sudo apt-get update
          sudo apt-get install -y groovy
      
      - name: Build SAF Dev Plugin
        run: groovy gendevplugin.groovy
        working-directory: ${{ github.workspace }}
      
      - name: Build SAF Plugin
        run: groovy genplugin.groovy
        working-directory: ${{ github.workspace }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: |
            SAF_DevPlugin.zip
            SAF_Plugin.zip
      
      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SAF_DevPlugin.zip
            SAF_Plugin.zip
