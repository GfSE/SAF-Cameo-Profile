name: Build Plugin Zips

on:
  push:
    branches: [main, cameo2026x]
    tags: ["v*"]    
  pull_request:
    branches: [main, mcameo2026x]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Groovy
        uses: wtfjoke/setup-groovy@v3
        with:
          groovy-version: '4.0.21'
      
      
      - name: Build Plugins with Version
        run: |
          # Falls kein Tag da ist, nutze 'latest' als Fallback
          VERSION="${{ github.ref_name || 'latest' }}"
          groovy -DpluginVersion=$VERSION gendevplugin.groovy
          groovy -DpluginVersion=$VERSION genplugin.groovy

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: |
            SAF_DevPlugin.zip
            SAF_Plugin.zip
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SAF_DevPlugin.zip
            SAF_Plugin.zip
          generate_release_notes: true

